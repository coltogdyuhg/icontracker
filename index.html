<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Icon of the Seas — Position</title>
<style>
  :root{
    --blue:#0a4fa0;
    --blue-dark:#083d80;
    --box:rgba(255,255,255,.13);
    --box-line:rgba(255,255,255,.28);
    --text:#ffffff;
    --dim:#bfd4ef;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ width:100%; height:100%; background:var(--blue); color:var(--text);
    font-family:Arial, Helvetica, sans-serif; overflow:hidden; }

  #app{ width:100vw; height:100vh; display:flex; flex-direction:column; }

  /* ---- header: crest ---- */
  header{
    flex:none; background:var(--blue);
    display:flex; align-items:center; justify-content:center;
    padding:14px 0 10px;
  }
  .crest{
    width:46px; height:46px; border-radius:50%;
    border:2px solid #ffffffcc;
    display:flex; align-items:center; justify-content:center;
  }
  .crest svg{ width:26px; height:26px; }

  /* ---- body: sidebar + map ---- */
  #body{ flex:1; display:flex; min-height:0; }

  aside{
    flex:none; width:26vw; max-width:150px; min-width:108px;
    display:flex; flex-direction:column; gap:12px;
    padding:6px 8px;
  }
  .box{
    background:var(--box); border:1px solid var(--box-line);
    border-radius:8px; padding:8px 10px;
  }
  .box .lbl{ font-size:11px; color:var(--dim); letter-spacing:.02em; }
  .box .val{ font-size:clamp(13px,2.6vw,17px); font-weight:700; margin-top:3px; line-height:1.15; }

  .ship-icon{ flex:1; display:flex; align-items:flex-end; justify-content:center; padding-bottom:8px; }
  .ship-icon svg{ width:70%; height:auto; opacity:.95; }

  main{ flex:1; position:relative; background:#000; min-width:0; }
  main iframe{ width:100%; height:100%; border:0; display:block; }
  main .loading{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:Consolas,Menlo,monospace; color:#9db6dd; font-size:12px; letter-spacing:.05em;
  }

  /* ---- footer: date/time ---- */
  footer{
    flex:none; background:var(--blue-dark);
    padding:10px 14px;
    font-size:clamp(12px,2.4vw,14px);
  }

  #fsBtn{
    position:absolute; top:12px; right:12px; z-index:9;
    font-family:Arial, sans-serif; font-size:12px; color:#fff;
    background:#00000066; border:1px solid var(--box-line);
    border-radius:6px; padding:7px 12px; cursor:pointer;
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="crest">
      <!-- generic anchor mark: not the Royal Caribbean trademark, see chat -->
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round">
        <circle cx="12" cy="6" r="2.2"/>
        <line x1="12" y1="8.2" x2="12" y2="19"/>
        <line x1="7" y1="11" x2="17" y2="11"/>
        <path d="M6 15c0 3 2.5 5 6 5s6-2 6-5"/>
      </svg>
    </div>
  </header>

  <div id="body">
    <aside>
      <div class="box">
        <div class="lbl">Position</div>
        <div class="val" id="posVal">See map</div>
      </div>
      <div class="box">
        <div class="lbl">Speed</div>
        <div class="val" id="spdVal">See map</div>
      </div>
      <div class="box">
        <div class="lbl">Course</div>
        <div class="val" id="crsVal">See map</div>
      </div>
      <div class="ship-icon">
        <svg viewBox="0 0 200 60" fill="#ffffff">
          <path d="M10 40 Q10 30 20 30 L170 30 Q185 30 190 42 L188 46 Q100 52 12 46 Z"/>
          <rect x="35" y="14" width="10" height="16"/>
          <rect x="55" y="8" width="10" height="22"/>
          <rect x="75" y="14" width="60" height="16"/>
          <rect x="145" y="18" width="8" height="12"/>
        </svg>
      </div>
    </aside>

    <main id="mapMain">
      <div class="loading" id="mapLoading">
        LOADING POSITION DATA…<br><br>
        <a href="https://www.marinetraffic.com/en/ais/details/ships/mmsi:311001178" target="_blank" style="color:#9db6dd;">Open live tracker directly →</a>
      </div>
      <iframe id="mtFrame"
        src="https://www.marinetraffic.com/en/ais/embed/zoom:7/centery:24.8/centerx:-80.6/maptype:1/shownames:true/mmsi:0/shipid:0/fleet:/fleet_id:/vtypes:/showmenu:false/remember:false/trackvessel:311001178"
        scrolling="no" frameborder="0"
        onload="document.getElementById('mapLoading').style.display='none'">
      </iframe>
    </main>
  </div>

  <footer id="footerTime">—</footer>
  <button id="fsBtn">⛶ Full Screen</button>
</div>

<script>
  setTimeout(()=>{
    const l = document.getElementById('mapLoading');
    if(l && l.style.display !== 'none') l.innerHTML = "MAP DIDN'T LOAD<br><br><a href='https://www.marinetraffic.com/en/ais/details/ships/mmsi:311001178' target='_blank' style='color:#9db6dd;'>Open live tracker directly →</a>";
  }, 8000);

  function tickFooter(){
    const now = new Date();
    const d = new Intl.DateTimeFormat('en-US',{weekday:'long',day:'numeric',month:'long',year:'numeric',timeZone:'America/New_York'}).format(now);
    const t = new Intl.DateTimeFormat('en-US',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'America/New_York'}).format(now);
    document.getElementById('footerTime').textContent = `${d}, ${t} (UTC-04:00)`;
  }
  tickFooter(); setInterval(tickFooter,15000);

  const fsBtn = document.getElementById('fsBtn');
  fsBtn.addEventListener('click', ()=>{
    if(!document.fullscreenElement){ document.documentElement.requestFullscreen?.().catch(()=>{}); }
    else{ document.exitFullscreen?.(); }
  });

  let wakeLock = null;
  async function requestWakeLock(){
    try{ if('wakeLock' in navigator){ wakeLock = await navigator.wakeLock.request('screen'); } }catch(e){}
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') requestWakeLock(); });
</script>
</body>
</html>
