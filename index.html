<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Icon of the Seas — Position</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --blue:#0a4fa0;
    --blue-dark:#083d80;
    --box:rgba(255,255,255,.13);
    --box-line:rgba(255,255,255,.28);
    --text:#ffffff;
    --dim:#bfd4ef;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ width:100%; height:100%; background:var(--blue); color:var(--text);
    font-family:Arial, Helvetica, sans-serif; overflow:hidden; }

  #app{ width:100vw; height:100vh; display:flex; flex-direction:column; }

  header{
    flex:none; background:var(--blue);
    display:flex; align-items:center; justify-content:center;
    padding:14px 0 10px;
  }
  .crest{
    width:46px; height:46px; border-radius:50%;
    border:2px solid #ffffffcc;
    display:flex; align-items:center; justify-content:center;
  }
  .crest svg{ width:26px; height:26px; }

  #body{ flex:1; display:flex; min-height:0; }

  aside{
    flex:none; width:26vw; max-width:150px; min-width:108px;
    display:flex; flex-direction:column; gap:12px;
    padding:6px 8px;
  }
  .box{
    background:var(--box); border:1px solid var(--box-line);
    border-radius:8px; padding:8px 10px;
  }
  .box .lbl{ font-size:11px; color:var(--dim); letter-spacing:.02em; }
  .box .val{ font-size:clamp(13px,2.6vw,17px); font-weight:700; margin-top:3px; line-height:1.15; }

  .ship-icon{ flex:1; display:flex; align-items:flex-end; justify-content:center; padding-bottom:8px; }
  .ship-icon svg{ width:70%; height:auto; opacity:.95; }

  main{ flex:1; position:relative; background:#0b2e52; min-width:0; }
  #map{ width:100%; height:100%; background:#0b2e52; }

  /* keep Leaflet chrome minimal + on-brand */
  .leaflet-control-attribution{
    background:rgba(8,61,128,.7) !important; color:#cfe0f7 !important; font-size:9px !important;
  }
  .leaflet-control-attribution a{ color:#cfe0f7 !important; }
  .leaflet-bar a{ background:rgba(8,61,128,.85) !important; color:#fff !important; border-color:var(--box-line) !important; }
  .leaflet-control-scale-line{
    background:rgba(8,61,128,.6) !important; color:#fff !important; border-color:#fff !important;
  }
  .place-label{
    color:#eaf2ff; font-size:12px; font-weight:600; text-shadow:0 1px 3px #000a;
    white-space:nowrap;
  }
  .ship-marker{ display:flex; align-items:center; justify-content:center; }

  footer{
    flex:none; background:var(--blue-dark);
    padding:10px 14px;
    font-size:clamp(12px,2.4vw,14px);
  }

  #fsBtn{
    position:absolute; top:12px; right:12px; z-index:9;
    font-family:Arial, sans-serif; font-size:12px; color:#fff;
    background:#00000066; border:1px solid var(--box-line);
    border-radius:6px; padding:7px 12px; cursor:pointer;
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="crest">
      <!-- generic anchor mark: not the Royal Caribbean trademark, see chat -->
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round">
        <circle cx="12" cy="6" r="2.2"/>
        <line x1="12" y1="8.2" x2="12" y2="19"/>
        <line x1="7" y1="11" x2="17" y2="11"/>
        <path d="M6 15c0 3 2.5 5 6 5s6-2 6-5"/>
      </svg>
    </div>
  </header>

  <div id="body">
    <aside>
      <div class="box">
        <div class="lbl">Position</div>
        <div class="val" id="posVal">24°54.0' N<br>080°24.0' W</div>
      </div>
      <div class="box">
        <div class="lbl">Speed</div>
        <div class="val" id="spdVal">20.7 kn</div>
      </div>
      <div class="box">
        <div class="lbl">Course</div>
        <div class="val" id="crsVal">235°</div>
      </div>
      <div class="ship-icon">
        <svg viewBox="0 0 200 60" fill="#ffffff">
          <path d="M10 40 Q10 30 20 30 L170 30 Q185 30 190 42 L188 46 Q100 52 12 46 Z"/>
          <rect x="35" y="14" width="10" height="16"/>
          <rect x="55" y="8" width="10" height="22"/>
          <rect x="75" y="14" width="60" height="16"/>
          <rect x="145" y="18" width="8" height="12"/>
        </svg>
      </div>
    </aside>

    <main id="mapMain">
      <div id="map"></div>
    </main>
  </div>

  <footer id="footerTime">—</footer>
  <button id="fsBtn">⛶ Full Screen</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ---- ship position (fixed for now — see chat re: live data) ----
  const SHIP_LAT = 24.90, SHIP_LON = -80.40, SHIP_COURSE_DEG = 235;

  const map = L.map('map', {
    zoomControl:true,
    attributionControl:true,
    center:[24.4,-81.2],
    zoom:6.4,
    zoomSnap:0.1
  });

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution:'Imagery &copy; Esri, Maxar, Earthstar Geographics',
    maxZoom:12
  }).addTo(map);

  L.control.scale({imperial:true, metric:true, position:'bottomleft'}).addTo(map);

  const places = [
    {name:'Tampa', lat:27.95, lon:-82.46},
    {name:'Miami', lat:25.76, lon:-80.19},
    {name:'Fort Lauderdale', lat:26.12, lon:-80.14},
    {name:'Ciudad de La Habana', lat:23.13, lon:-82.38},
    {name:'Camagüey', lat:21.38, lon:-77.92}
  ];
  places.forEach(p=>{
    L.marker([p.lat,p.lon],{
      icon:L.divIcon({className:'', html:'<div style="width:6px;height:6px;background:#fff;border:1px solid #0a4fa0;border-radius:1px;"></div>', iconSize:[6,6]}),
      interactive:false
    }).addTo(map);
    L.marker([p.lat,p.lon],{
      icon:L.divIcon({className:'', html:`<div class="place-label">${p.name}</div>`, iconSize:[120,16], iconAnchor:[-8,8]}),
      interactive:false
    }).addTo(map);
  });

  // ship icon: circle with heading line, rotated to course
  const shipHtml = `
    <svg width="34" height="34" viewBox="0 0 34 34" style="transform:rotate(${SHIP_COURSE_DEG}deg);">
      <circle cx="17" cy="17" r="9" fill="none" stroke="#ffffff" stroke-width="2"/>
      <line x1="17" y1="17" x2="17" y2="3" stroke="#ffffff" stroke-width="2"/>
    </svg>`;
  L.marker([SHIP_LAT, SHIP_LON], {
    icon: L.divIcon({className:'ship-marker', html:shipHtml, iconSize:[34,34], iconAnchor:[17,17]})
  }).addTo(map);

  function fmtCoord(dec, isLat){
    const dir = isLat ? (dec>=0?'N':'S') : (dec>=0?'E':'W');
    const a = Math.abs(dec);
    const deg = Math.floor(a);
    const min = ((a-deg)*60).toFixed(2);
    return `${String(deg).padStart(isLat?2:3,'0')}°${min}' ${dir}`;
  }
  document.getElementById('posVal').innerHTML = `${fmtCoord(SHIP_LAT,true)}<br>${fmtCoord(SHIP_LON,false)}`;
  document.getElementById('crsVal').textContent = SHIP_COURSE_DEG + '°';

  // ---- footer clock ----
  function tickFooter(){
    const now = new Date();
    const d = new Intl.DateTimeFormat('en-US',{weekday:'long',day:'numeric',month:'long',year:'numeric',timeZone:'America/New_York'}).format(now);
    const t = new Intl.DateTimeFormat('en-US',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'America/New_York'}).format(now);
    document.getElementById('footerTime').textContent = `${d}, ${t} (UTC-04:00)`;
  }
  tickFooter(); setInterval(tickFooter,15000);

  // ---- full screen ----
  document.getElementById('fsBtn').addEventListener('click', ()=>{
    if(!document.fullscreenElement){ document.documentElement.requestFullscreen?.().catch(()=>{}); }
    else{ document.exitFullscreen?.(); }
  });

  // ---- keep screen awake ----
  let wakeLock = null;
  async function requestWakeLock(){
    try{ if('wakeLock' in navigator){ wakeLock = await navigator.wakeLock.request('screen'); } }catch(e){}
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') requestWakeLock(); });
</script>
</body>
</html>
